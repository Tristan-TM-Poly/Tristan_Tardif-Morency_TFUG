name: Axiom-Tristan Auto-Forge (HGFM)

on:
  push:
    branches: [ main ]
  schedule:
    # L'Analyse Perpétuelle : S'exécute tous les jours à minuit UTC
    - cron: '0 0 * * *'

jobs:
  ingest_and_forge:
    runs-on: ubuntu-latest

    steps:
    - name: Extraction du Code
      uses: actions/checkout@v3

    - name: Configuration Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installation du Triumvirat (Dépendances)
      run: |
        pip install numpy scipy matplotlib pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib

    - name: Génération de la Clé Dimensionnelle (Google Credentials)
      env:
        # La clé est stockée secrètement dans GitHub Secrets
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      run: |
        echo $GCP_CREDENTIALS > credentials.json

    - name: Connexion Drive et Extraction Raman
      run: |
        python src/raman_automation/drive_ingestion_tfuga.py

    - name: Compilation GOLIATH (LaTeX)
      uses: xu-cheng/latex-action@v2
      with:
        root_file: rapport_*.tex # Compile tous les rapports générés

    - name: Upload des preuves vers l'Axiome (Artefacts PDF)
      uses: actions/upload-artifact@v3
      with:
        name: Rapports-SYNERGIE-T3
        path: "*.pdf"

    - name: Archivage de la Preuve (Upload PDF)
      uses: actions/upload-artifact@v3
      with:
        name: Rapport-Axiome-Tristan
        path: rapport_final.pdf
