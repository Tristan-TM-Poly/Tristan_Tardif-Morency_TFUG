name: TFUGA Claim Router Governance

on:
  pull_request:
    paths:
      - 'docs/governance/TFUGA_CLAIM_ROUTER.md'
      - 'schemas/tfuga_claim_route.schema.json'
      - 'tools/claim_router.py'
      - 'tools/claim_router_ci.py'
      - 'samples/claim_routes/**'
      - '.github/workflows/claim_router_governance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  claim-router-governance:
    name: Claim router governance gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Claim Router checks
        run: python tools/claim_router_ci.py

      - name: Upload claim router artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claim-router-governance-summary
          path: |
            docs/governance/TFUGA_CLAIM_ROUTER.md
            schemas/tfuga_claim_route.schema.json
            tools/claim_router.py
          if-no-files-found: warn
