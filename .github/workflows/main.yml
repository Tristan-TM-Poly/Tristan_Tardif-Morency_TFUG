name: Axiom-Tristan Auto-Forge

# Le workflow se déclenche à chaque "push" sur la branche main
on:
  push:
    branches: [ main, master ]

jobs:
  build_and_report:
    runs-on: ubuntu-latest

    steps:
    - name: Extraction du Code (Checkout)
      uses: actions/checkout@v3

    - name: Configuration de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installation des dépendances (AI-7 Engine)
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy matplotlib pandas

    - name: Exécution de l'Analyse Raman (TRISTAN2)
      run: |
        # On suppose que ton script se nomme 'spectrometre_tfuga.py'
        # Il doit être configuré pour lire les fichiers dans un dossier /data
        python src/raman_automation/spectrometre_tfuga.py

    - name: Compilation du Rapport LaTeX (GOLIATH)
      uses: xu-cheng/latex-action@v2
      with:
        # Le script Python doit générer un fichier nommé 'rapport_final.tex'
        root_file: rapport_final.tex

    - name: Archivage de la Preuve (Upload PDF)
      uses: actions/upload-artifact@v3
      with:
        name: Rapport-Axiome-Tristan
        path: rapport_final.pdf
