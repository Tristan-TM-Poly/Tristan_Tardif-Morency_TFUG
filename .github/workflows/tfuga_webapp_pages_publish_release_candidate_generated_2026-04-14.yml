name: TFUGA Webapp Pages Publish Release Candidate Generated 2026-04-14

on:
  workflow_dispatch:
  push:
    paths:
      - 'applied/2026-04-14/webapp/**'
      - 'applied/2026-04-14/web/**'
      - '.github/workflows/tfuga_webapp_pages_publish_release_candidate_generated_2026-04-14.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tfuga-webapp-pages-release-candidate
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: applied/2026-04-14/webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: applied/2026-04-14/webapp/package.json

      - name: Align App entry to release candidate
        run: cp src/App_pages_release_candidate.tsx src/App.tsx

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: applied/2026-04-14/webapp/dist

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
