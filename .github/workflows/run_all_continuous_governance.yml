name: Run All Continuous TFUGA Governance

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'products/**'
      - 'schemas/**'
      - 'examples/**'
      - 'samples/**'
      - 'tools/**'
      - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  run-all-governance:
    name: Run all TFUGA governance gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run all governance gates once
        run: python tools/run_all_governance_continuous.py

      - name: Upload continuous governance status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: continuous-governance-status
          path: outputs/governance/continuous_governance_status.json
          if-no-files-found: warn
