name: Supervised Real Execution

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run allowed script
        run: |
          python - <<'PY'
          from orchestration.script_execution_adapter import run_script
          print(run_script("demo_ai7_full_loop"))
          PY
