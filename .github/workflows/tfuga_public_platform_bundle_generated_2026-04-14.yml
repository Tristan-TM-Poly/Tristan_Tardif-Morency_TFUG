name: TFUGA Public Platform Bundle Generated 2026-04-14

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  public-platform-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run public platform bundle
        run: python applied/2026-04-14/runtime/run_public_platform_bundle_generated_2026-04-14.py

      - name: Upload public platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfuga-public-platform-bundle-generated-2026-04-14
          path: applied/2026-04-14/runtime/artifacts/
