name: Déploiement Auto-Gouverné AT-1

on:
  push:
    branches: [ main ] # Déclenche l'étincelle à chaque commit sur main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout du Code Source
      uses: actions/checkout@v3

    - name: Authentification Google Cloud (Premium)
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Build et Push de l'Image Docker
      run: |
        gcloud auth configure-docker
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/spark-api:latest .
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/spark-api:latest

    - name: Mise à jour de l'Instance Cloud Run
      run: |
        gcloud run deploy spark-api-at1 \
          --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/spark-api:latest \
          --region northamerica-northeast1 \
          --platform managed

